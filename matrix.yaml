# GROMACS benchmark matrix.
# A cell is (workload x instance x config). Configs are the "there is more than
# one way to run this" axis: timestep/HMR, force placement, MIG carve.
# Fill in bucket + image URIs before running.

# Account/region come from the environment so nothing account-specific is
# committed to this public repo. Export before a live run, e.g.:
#   export AWS_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
#   export AWS_REGION=us-east-1
# (DRY_RUN skips the requirement, so --list / dry sweeps need nothing set.)
s3_bucket: aws-gromacs-bench-${AWS_ACCOUNT}   # -> s3://<bucket>/gromacs-bench/tpr/*.tpr
region: ${AWS_REGION}                         # ECR/truffle/spawn all use this region
# Timed run length. -resethway resets counters at nsteps/2, discarding warmup;
# the timed half must start AFTER GPU PME auto-tuning finishes, or mdrun aborts
# ("PME tuning was still active when attempting to reset counters"). PME tuning
# on GPU can run several thousand steps, so keep nsteps/2 well clear of it.
# 60000 -> reset at 30000, ample margin on every device (CPU has no GPU PME
# tuning, so it was fine at 20000; this is set for the GPU cells).
nsteps: 60000
ttl_minutes: 120
idle_minutes: 15

# ns/day is noisy run-to-run (thermal, noisy neighbours, PME tuning draw, DVFS,
# spot placement). One timed run is not a measurement. Each cell runs this many
# independent timed replicates; parse_log.py reports mean +/- 95% CI. A cell
# can override with `replicates:` in its config entry. This is a CI on the
# PERFORMANCE PROXY -- it is not scientific seed convergence, which stays
# downstream (see PLAN-cost-per-result.md). >=3 needed for a defensible CI.
replicates: 3

# Cloud queues too. How long to keep retrying a contended pool before the cell
# is recorded as infeasible:capacity -- the direct analogue of a batch job that
# never leaves the queue.
capacity_max_wait_minutes: 30

# Acquire capacity by watching (lagotto) rather than by failing repeatedly.
# false falls back to the retry/backoff loop.
# Set false until the Phase-1 cell validates the launch->pull->run->terminate
# path: the retry path is fully verified syntax, whereas the lagotto async flow
# is not yet exercised end-to-end. Validate one new thing at a time; flip to
# true once the plumbing is proven and we want the capacity-watch behaviour.
use_lagotto: false

# GPU cells need an AMI with NVIDIA host drivers -- spawn's auto-AMI fails for
# GPU instance types (spore-host/spawn#384), so pin one. This is the "Deep
# Learning Base OSS Nvidia Driver GPU AMI (Amazon Linux 2023)" in us-east-1;
# region-specific, so override via the env for other regions. CPU cells leave
# this unset and auto-detect AL2023.
gpu_ami: ${GPU_AMI}

# ECR image URIs (docs/gromacs-delivery.md). One repo, five tags; spawn launches
# a bare AL2023 instance and docker-runs the arch-appropriate tag on boot. Push
# these before any live run (issue #2). Registry = <acct>.dkr.ecr.<region>...
images:
  # Registry is ${AWS_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com, filled from
  # the env (see above). Tags: Intel AVX-512 / Zen5 AVX-512 / Zen5 AVX2_256 /
  # Graviton4 SVE2 / GPU CUDA.
  intel: ${AWS_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/gromacs-bench:intel-avx512
  amd: ${AWS_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/gromacs-bench:amd-avx512
  amd_avx2: ${AWS_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/gromacs-bench:amd-avx2
  arm: ${AWS_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/gromacs-bench:arm-sve
  cuda: ${AWS_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/gromacs-bench:cuda

workloads:
  - id: small
    tpr: benchMEM              # base name; variant suffix appended, .tpr added
    atoms: 82000
  - id: medium
    # Real membrane protein in a POPC bilayer (benchMEM's class, scaled up),
    # built in CHARMM-GUI Membrane Builder and ingested by
    # preprocess/build_medium_charmmgui.sh (CHARMM36m; base 2fs + HMR 4fs). See
    # docs/divergence.md. `atoms` is set from the measured count after the build,
    # not guessed. GATED on CHARMM-GUI login (~24h).
    tpr: channel-medium
    atoms: 0                   # PLACEHOLDER -- set from the CHARMM-GUI build
  - id: large
    tpr: benchRIB
    atoms: 2000000

# ---------------------------------------------------------------------------
# Instances. provider: aws (spawn via spore) | local (run in place, fixed cost).
# ---------------------------------------------------------------------------
instances:
  - id: c8i
    provider: aws
    type: c8i.24xlarge
    class: cpu
    arch: intel

  # --- Phase 6: Intel generational ladder (c5->c8i). Same intel AVX-512 image
  # (Intel has had AVX-512 since Skylake/c5). Run via
  # `--instances c5,c6i,c7i,c8i` to show $/hr ranking != $/result ranking as the
  # generations climb. Prune to these rungs; not part of the default sweep.
  - id: c5
    provider: aws
    type: c5.24xlarge          # Skylake-SP (2017)
    class: cpu
    arch: intel
  - id: c6i
    provider: aws
    type: c6i.24xlarge         # Ice Lake (2021)
    class: cpu
    arch: intel
  - id: c7i
    provider: aws
    type: c7i.24xlarge         # Sapphire Rapids (2023)
    class: cpu
    arch: intel

  # AMD EPYC Turin (Zen 5). 4.5 GHz, 33% more memory bandwidth than c7a --
  # the bandwidth number is the one that matters for MD, not the clock.
  - id: c8a
    provider: aws
    type: c8a.24xlarge
    class: cpu
    arch: amd

  # Same silicon, AVX2_256 build. On AMD the SIMD build choice has historically
  # been worth more than the instance choice; this arm tests that directly.
  - id: c8a-avx2
    provider: aws
    type: c8a.24xlarge
    class: cpu
    arch: amd_avx2

  - id: c8g                    # Graviton4, SVE2
    provider: aws
    type: c8g.24xlarge
    class: cpu
    arch: arm

  - id: g6                     # L4
    provider: aws
    type: g6.4xlarge
    class: gpu
    arch: cuda

  - id: g6e                    # L40S
    provider: aws
    type: g6e.2xlarge
    class: gpu
    arch: cuda
    wait_samples: 10

  - id: g7e                    # RTX PRO 6000 Blackwell
    provider: aws
    type: g7e.2xlarge
    class: gpu
    arch: cuda
    wait_samples: 10           # probe capacity-acquisition distribution

  # Local hardware as first-class arms (D3). amortized_hr = your own number:
  # (capital + power) / expected lifetime hours. Put the assumption in writing.
  - id: local-5090
    provider: local
    type: RTX-5090
    class: gpu
    arch: cuda
    amortized_hr: 0.35

  - id: local-spark
    provider: local
    type: DGX-Spark
    class: gpu
    arch: cuda
    amortized_hr: 0.15

  # On-prem arm. Same harness, submitted through the site scheduler. Cost is
  # optional on purpose -- most sites cannot defend a $/hr and do not want the
  # argument. time/result works without it.
  - id: onprem-cluster
    provider: onprem
    type: local-slurm
    class: gpu
    arch: cuda
    partition: gpu
    submit: sbatch
    amortized_hr: 0.0          # 0 => $/ns columns blank, time columns still valid
    wait_samples: 20           # probe submissions used to build the wait distribution

# ---------------------------------------------------------------------------
# Configs: the methodology axis. applies_to matches instance class or id.
# mdrun_flags are appended verbatim. tpr_variant selects a prebuilt .tpr.
# ---------------------------------------------------------------------------
configs:
  # --- Core-count sweep (CPU): expose the memory-bandwidth ceiling. Run one
  # instance across fixed thread counts (-nt N) to see where ns/day plateaus --
  # if MD is bandwidth-bound, adding cores stops helping well before 96, and the
  # plateau (not the core count) is what differs by generation. Explains the
  # non-monotonic generational ranking at full width. Scope with
  # `--configs nt8,nt16,nt32,nt48,nt96 --instances c6i,c8i --workloads small`.
  - id: nt8
    applies_to: [cpu]
    tpr_variant: ""
    mdrun_flags: "-nt 8 -pin on"
  - id: nt16
    applies_to: [cpu]
    tpr_variant: ""
    mdrun_flags: "-nt 16 -pin on"
  - id: nt32
    applies_to: [cpu]
    tpr_variant: ""
    mdrun_flags: "-nt 32 -pin on"
  - id: nt48
    applies_to: [cpu]
    tpr_variant: ""
    mdrun_flags: "-nt 48 -pin on"
  - id: nt96
    applies_to: [cpu]
    tpr_variant: ""
    mdrun_flags: "-nt 96 -pin on"

  # --- D2: force placement (GPU only) ---
  # gpu-resident = full GPU-resident step, integration included (-update gpu).
  # This is the "modern" ideal, BUT it needs GPU-LINCS-compatible constraints
  # (h-bonds). The distributed MPINAT tprs use all-bonds, so -update gpu is
  # infeasible on them (declared below) -- a real finding. Campaign B's
  # self-built h-bonds system demonstrates true gpu-resident for contrast.
  - id: gpu-resident
    applies_to: [gpu]
    tpr_variant: ""
    mdrun_flags: "-nb gpu -pme gpu -bonded gpu -update gpu -pin on"

  - id: gpu-prod              # standard production placement: forces on GPU,
                              # integration on the CPU. Runs regardless of the
                              # tpr's constraint topology, unlike -update gpu
                              # (gpu-resident). The most common real-world GPU
                              # config, and what benchMEM/benchRIB actually run.
    applies_to: [gpu]
    tpr_variant: ""
    mdrun_flags: "-nb gpu -pme gpu -bonded gpu -update cpu -pin on"

  - id: gpu-cpu-pme            # PME back on the CPU
    applies_to: [gpu]
    tpr_variant: ""
    mdrun_flags: "-nb gpu -pme cpu -bonded cpu -update cpu -pin on"

  # --- D1: hydrogen mass repartitioning (needs benchXXX-hmr.tpr, 4 fs dt) ---
  - id: hmr
    applies_to: [gpu]
    tpr_variant: "-hmr"
    mdrun_flags: "-nb gpu -pme gpu -bonded gpu -update cpu -pin on"

  - id: cpu-hmr
    applies_to: [cpu]
    tpr_variant: "-hmr"
    mdrun_flags: "-pin on"

  # --- CPU baseline ---
  - id: cpu-base
    applies_to: [cpu]
    tpr_variant: ""
    mdrun_flags: "-pin on"

  # --- D13: MIG carves (g7e only). mig_slices>0 => one sim per slice. ---
  - id: mig2
    applies_to: [g7e]
    tpr_variant: ""
    mdrun_flags: "-nb gpu -pme gpu -bonded gpu -update cpu -ntmpi 1 -pin on"
    mig_slices: 2
    mig_profile: 2g.48gb

  - id: mig4
    applies_to: [g7e]
    tpr_variant: ""
    mdrun_flags: "-nb gpu -pme gpu -bonded gpu -update cpu -ntmpi 1 -pin on"
    mig_slices: 4
    mig_profile: 1g.24gb

  # --- MPS packing, for comparison against the MIG carves ---
  - id: mps4
    applies_to: [g7e, g6e]
    tpr_variant: ""
    mdrun_flags: "-nb gpu -pme gpu -bonded gpu -update cpu -ntmpi 1 -pin on"
    mps_procs: 4

# ---------------------------------------------------------------------------
# Infeasible cells. These are NOT dropped -- they emit a row with outcome and a
# typed reason, because "couldn't run it at all" is a result. Classes:
#   capacity   - not enough of the resource exists
#   latency    - wait exceeds the useful life of the answer
#   hardware   - no device of that class present
#   elasticity - width cannot vary mid-campaign
#   fit        - problem does not fit the device
infeasible:
  # gpu-resident (-update gpu) needs GPU-LINCS-compatible constraints; the
  # distributed benchMEM/benchRIB tprs are all-bonds, so the GPU-resident update
  # path is unsupported for them. A real finding: the canonical, as-shipped
  # benchmark inputs can't use the modern fully-GPU step. Use gpu-prod (-update
  # cpu) for these; Campaign B's h-bonds system shows true gpu-resident.
  - {config: gpu-resident, class: fit,
     reason: "-update gpu unsupported: all-bonds constraints exceed GPU LINCS (distributed tpr)"}
  - {instance: local-spark, workload: large, class: fit,
     reason: "2M atoms exceeds usable unified memory for this config"}
  - {config: mig4, workload: large, class: fit,
     reason: "2M atoms in a 1g.24gb slice"}
  - {instance: onprem-cluster, config: mig2, class: hardware,
     reason: "no MIG-capable cards in the cluster"}
  - {instance: onprem-cluster, config: mig4, class: hardware,
     reason: "no MIG-capable cards in the cluster"}

# Skip = do not run, do not report (genuinely uninteresting, not a finding).
skip: []
